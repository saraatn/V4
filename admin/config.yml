backend:
  name: git-gateway
  branch: main

media_folder: "img/uploads"
public_folder: "/img/uploads"

# Editors work on a single file (content.json) that holds every station's
# editable text. Hotspot positions / scene layout live in data.js and are
# NOT exposed here on purpose, so an event volunteer can't accidentally
# break the 3D tour navigation.
collections:
  - name: "content"
    label: "Station Content"
    files:
      - name: "stations"
        label: "Exhibit Stations"
        file: "content.json"
        fields:
          - label: "Stations"
            name: "stations"
            widget: "list"
            summary: "{{title}}"
            fields:
              - {label: "Internal key (do not edit)", name: "key", widget: "string", read_only: true}
              - {label: "Reference label (do not edit)", name: "name", widget: "string", read_only: true}
              - {label: "Station Title", name: "title", widget: "string"}
              - {label: "Description", name: "text", widget: "text"}
              - {label: "YouTube Video ID", name: "video", widget: "string", required: false, hint: "The part after 'v=' in the YouTube URL, e.g. dQw4w9WgXcQ"}
