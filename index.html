<!DOCTYPE html>
<html>
<head>
<title>Project Title</title>
<meta charset="utf-8">
<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
<style> 
  @-ms-viewport { width: device-width; } 

  /* PROGRESS BAR STYLING */
  #progress-bar-container {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 14px;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid #fff;
    border-radius: 10px;
    z-index: 2000;
    overflow: hidden;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
  }
  #progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #8BC34A);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* LEFT-ALIGNED 2D FLOOR PLAN PANEL */
  #floorplan-container {
    position: absolute;
    bottom: 20px;
    left: 20px; /* Moved to the left side */
    width: 280px; 
    height: auto;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid #222;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    padding: 8px;
    user-select: none;
  }
  #floorplan-container .map-wrapper {
    position: relative;
    width: 100%;
  }
  #floorplan-container img.floorplan-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  /* ABSOLUTE INTERACTIVE MAP DOTS POSITIONING */
  .map-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    background-color: #ff3300;
    border: 2px solid #fff;
    border-radius: 50%;
    cursor: pointer;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    transition: transform 0.2s ease, background-color 0.2s ease;
    z-index: 1005;
  }
  .map-dot:hover {
    background-color: #00e5ff;
    transform: translate(-50%, -50%) scale(1.4);
  }
  .map-dot.active-location {
    background-color: #00ff22;
    box-shadow: 0 0 10px #00ff22, 0 2px 5px rgba(0,0,0,0.5);
  }
</style>
<link rel="stylesheet" href="vendor/reset.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="multiple-scenes">

<div id="pano"></div>

<div id="progress-bar-container">
  <div id="progress-bar"></div>
</div>

<div id="floorplan-container">
  <div style="font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 6px; color: #111; font-family: sans-serif;">Interactive Layout</div>
  <div class="map-wrapper">
    <img src="floorplan.png" alt="Floorplan Layout" class="floorplan-img">
    
    <div class="map-dot" data-scene="0-01nexus" style="top: 15%; left: 20%;" title="(01)nexus"></div>
    <div class="map-dot" data-scene="1-02iot" style="top: 30%; left: 35%;" title="(02)IoT"></div>
    <div class="map-dot" data-scene="2-03transition" style="top: 45%; left: 50%;" title="(03)Transition"></div>
    <div class="map-dot" data-scene="5-06linde" style="top: 75%; left: 70%;" title="(06)linde"></div>
    <div class="map-dot" data-scene="10-11seat" style="top: 85%; left: 85%;" title="(11)seat"></div>
  </div>
</div>

<div id="sceneList">
  <ul class="scenes">
    <a href="javascript:void(0)" class="scene" data-id="0-01nexus"><li class="text">(01)nexus</li></a>
    <a href="javascript:void(0)" class="scene" data-id="1-02iot"><li class="text">(02)IoT</li></a>
    <a href="javascript:void(0)" class="scene" data-id="2-03transition"><li class="text">(03)Transition</li></a>
    <a href="javascript:void(0)" class="scene" data-id="3-04libiao"><li class="text">(04)libiao</li></a>
    <a href="javascript:void(0)" class="scene" data-id="4-05transition-2-3"><li class="text">(05)transition (2-3)</li></a>
    <a href="javascript:void(0)" class="scene" data-id="5-06linde"><li class="text">(06)linde</li></a>
    <a href="javascript:void(0)" class="scene" data-id="6-074ws-and-lean"><li class="text">(07)4ws and lean</li></a>
    <a href="javascript:void(0)" class="scene" data-id="7-08transition-aft-lean"><li class="text">(08)transition (aft lean)</li></a>
    <a href="javascript:void(0)" class="scene" data-id="8-09appsheet"><li class="text">(09)appsheet</li></a>
    <a href="javascript:void(0)" class="scene" data-id="9-10behind-seats"><li class="text">(10)behind seats</li></a>
    <a href="javascript:void(0)" class="scene" data-id="10-11seat"><li class="text">(11)seat</li></a>
  </ul>
</div>

<div id="titleBar">
  <h1 class="sceneName"></h1>
</div>

  <img class="icon on" src="img/pause.png">

<script src="data.js"></script>
<script src="index.js"></script>

<script>
  (function(){
    if(!window.chatbase || window.chatbase("queue", arguments)) {
      var next = window.chatbase = function() {
        next.queue.push(arguments);
        next.userOptions = next.userOptions || {};
        for(var key in next.userOptions) {
          next[key] = next[key.userOptions[key]];
        }
        return next;
      };
      next.queue = [];
      var script = document.createElement("script");
      script.src = "https://www.chatbase.co/embed.min.js";
      script.id = "Your-Unique-Chatbase-Id-Here"; // Ensure your specific production hash replaces this string
      script.domain = "www.chatbase.co";
      script.defer = true;
      document.head.appendChild(script);
    }
  })();
</script>

<script>
  const standardStations = [
    '0-01nexus',
    '1-02iot',
    '2-03transition',
    '5-06linde',
    '10-11seat'
  ];
  let visitedStations = new Set();

  document.addEventListener("DOMContentLoaded", function() {
      // Loop tracking system watching Marzipano's state engine alterations
      setInterval(() => {
          const sceneElements = document.querySelectorAll('#sceneList .scene');
          sceneElements.forEach(elem => {
              // Capture active elements via the class assigned by index.js
              if (elem.classList.contains('current')) {
                  const sceneId = elem.getAttribute('data-id');
                  
                  // Update active states on the 2D layout map
                  document.querySelectorAll('.map-dot').forEach(dot => {
                      if (dot.getAttribute('data-scene') === sceneId) {
                          dot.classList.add('active-location');
                      } else {
                          dot.classList.remove('active-location');
                      }
                  });

                  if (standardStations.includes(sceneId)) {
                      registerStation(sceneId);
                  }
              }
          });
      }, 400);
  });

  function registerStation(sceneId) {
      if (!visitedStations.has(sceneId)) {
          visitedStations.add(sceneId);
          const progressPercentage = (visitedStations.size / standardStations.length) * 100;
          const pb = document.getElementById('progress-bar');
          if (pb) {
              pb.style.width = progressPercentage + '%';
          }
      }
  }
</script>

</body>
</html>
