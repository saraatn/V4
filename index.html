<style> 
  @-ms-viewport { width: device-width; } 
  
  /* Built-in Styling to prevent layout breaking before style.css loads */
  #progress-bar-container {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 10px;
    background: rgba(0,0,0,0.5);
    border-radius: 5px;
    z-index: 1000;
    overflow: hidden;
  }
  #progress-bar {
    width: 0%;
    height: 100%;
    background: #2196F3;
    transition: width 0.3s ease;
  }
  #floorplan-map {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 220px;
    height: 150px;
    background: rgba(255, 255, 255, 0.85);
    border: 2px solid #333;
    border-radius: 8px;
    z-index: 1000;
    padding: 5px;
  }
  .map-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #ff5722;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #fff;
    transform: translate(-50%, -50%);
  }
  .map-dot:hover {
    background: #00bcd4;
    transform: translate(-50%, -50%) scale(1.3);
  }
</style>

<script>
  // Updated tracking array elements to monitor matching HTML structural dataset fields
  const standardStations = [
    '0-01nexus',
    '1-02iot',
    '2-03transition',
    '5-06linde'
  ];
  let visitedStations = new Set();

  document.addEventListener("DOMContentLoaded", function() {
      initializeDOMTracker();
  });

  function initializeDOMTracker() {
      setInterval(() => {
          const sceneElements = document.querySelectorAll('#sceneList .scene');
          sceneElements.forEach(elem => {
              if (elem.classList.contains('current')) {
                  const sceneId = elem.getAttribute('data-id');
                  if (standardStations.includes(sceneId)) {
                      registerStation(sceneId);
                  }
              }
          });
      }, 500);
  }

  function registerStation(sceneId) {
      if (!visitedStations.has(sceneId)) {
          visitedStations.add(sceneId);
          const progressPercentage = (visitedStations.size / standardStations.length) * 100;
          const pb = document.getElementById('progress-bar');
          if (pb) {
              pb.style.width = progressPercentage + '%';
          }
      }
  }
</script>
